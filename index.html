<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rasgruh – Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,600;0,700;1,300;1,600&family=Tiro+Devanagari+Hindi&family=Tenor+Sans&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg:      #0D0500;
      --red:     #FF3A00;
      --orange:  #FF7A1A;
      --gold:    #FFB800;
      --cream:   #FFF5E0;
      --muted:   #8A6040;
      --dark:    #1A0800;
    }

    html, body { height:100%; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Cormorant', serif;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 12px; height: 12px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.15s ease, width 0.2s, height 0.2s;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
    }

    /* ── MESH GRADIENT BG ── */
    .mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 60% at 15% 85%, rgba(255,58,0,0.35) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 85% 15%, rgba(255,184,0,0.2) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 50% 50%, rgba(255,122,26,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 80% 80% at 50% 100%, rgba(255,58,0,0.15) 0%, transparent 50%);
      animation: meshShift 8s ease-in-out infinite alternate;
    }

    @keyframes meshShift {
      0%   { opacity: 0.8; }
      100% { opacity: 1; }
    }

    /* Noise grain */
    .grain {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.1'/%3E%3C/svg%3E");
      opacity: 0.5; mix-blend-mode: overlay;
    }

    /* Thin border */
    .frame { position:fixed; inset:16px; border:1px solid rgba(255,184,0,0.2); pointer-events:none; z-index:2; }

    /* ── FLOATING SPICE PARTICLES ── */
    .particles { position:fixed; inset:0; z-index:3; pointer-events:none; }
    .p { position:absolute; opacity:0; animation: rise linear infinite; }
    @keyframes rise {
      0%   { transform: translateY(105vh) rotate(0deg);   opacity:0; }
      8%   { opacity: 0.7; }
      92%  { opacity: 0.4; }
      100% { transform: translateY(-5vh) rotate(720deg);  opacity:0; }
    }
    .p-seed  { width:4px; height:10px; border-radius:50%; background:var(--gold); }
    .p-flake { width:6px; height:6px; background:var(--red); clip-path:polygon(50% 0%,80% 20%,100% 50%,80% 80%,50% 100%,20% 80%,0% 50%,20% 20%); }
    .p-stick { width:2px; height:14px; border-radius:2px; background:var(--orange); }
    .p-dot   { width:5px; height:5px; border-radius:50%; background:var(--cream); opacity:0.5; }

    /* ── SVG SPICE ILLUSTRATIONS ── */
    .botanicals { position:fixed; inset:0; pointer-events:none; z-index:4; }
    .spice-illo {
      position:absolute; opacity:0.18;
      animation: breathe 7s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(255,122,26,0.4));
    }
    @keyframes breathe {
      0%,100% { transform: rotate(var(--r)) scale(1); }
      50%      { transform: rotate(calc(var(--r) + 3deg)) scale(1.04); }
    }

    /* ── MAIN CONTENT ── */
    .container {
      position: relative; z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 680px; width: 100%;
    }

    /* Stagger reveals */
    .reveal { opacity:0; animation: slideUp 0.9s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(40px) skewY(2deg); }
      to   { opacity:1; transform:translateY(0) skewY(0deg); }
    }
    .r1{animation-delay:.1s} .r2{animation-delay:.25s}
    .r3{animation-delay:.4s} .r4{animation-delay:.6s} .r5{animation-delay:.8s}

    /* Shree */
    .shree {
      font-family: 'Tiro Devanagari Hindi', serif;
      font-size: .9rem;
      color: var(--gold);
      display: block;
      letter-spacing: .35em;
      margin-bottom: 1.2rem;
      opacity: .6;
    }

    /* Eyebrow label */
    .eyebrow {
      font-family: 'Tenor Sans', sans-serif;
      font-size: .62rem;
      letter-spacing: .55em;
      text-transform: uppercase;
      color: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      margin-bottom: 1.5rem;
    }
    .eyebrow::before, .eyebrow::after {
      content: '';
      width: 30px; height: 1px;
      background: var(--orange);
      opacity: .5;
    }

    /* BIG HERO TEXT */
    .hero {
      line-height: 0.88;
      margin-bottom: 2rem;
      position: relative;
    }

    .coming {
      font-size: clamp(4rem, 14vw, 9rem);
      font-family: 'Cormorant', serif;
      font-weight: 300;
      font-style: italic;
      display: block;
      color: var(--cream);
      letter-spacing: .04em;
      line-height: 1;
    }

    .soon {
      font-size: clamp(4.5rem, 16vw, 10rem);
      font-family: 'Cormorant', serif;
      font-weight: 700;
      display: block;
      letter-spacing: -.01em;
      line-height: 0.9;
      /* Red-orange gradient fill */
      background: linear-gradient(90deg, var(--red) 0%, var(--orange) 40%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }

    /* Glitch flicker on "Soon" */
    .soon::before {
      content: 'Soon';
      position: absolute;
      left: 0; top: 0; width: 100%;
      background: linear-gradient(90deg, var(--red), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: glitch 5s infinite;
      clip-path: inset(0 0 70% 0);
      opacity: .6;
    }

    @keyframes glitch {
      0%,94%,100% { transform: translate(0); opacity:0; }
      95% { transform: translate(-3px, 1px); opacity:.5; }
      97% { transform: translate(3px, -1px); opacity:.4; }
      99% { transform: translate(-2px, 2px); opacity:.3; }
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.8rem auto; max-width: 360px;
    }
    .d-line { flex:1; height:1px; background: linear-gradient(to right, transparent, rgba(255,184,0,0.4)); }
    .d-line.r { background: linear-gradient(to left, transparent, rgba(255,184,0,0.4)); }
    .d-icon { font-size:.9rem; }

    /* Sub brand */
    .sub {
      font-family: 'Tenor Sans', sans-serif;
      font-size: .62rem;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brand-pill {
      display: inline-block;
      margin-top: 1.8rem;
      padding: .45rem 1.4rem;
      border: 1px solid rgba(255,184,0,0.3);
      font-family: 'Tenor Sans', sans-serif;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--gold);
      position: relative;
      overflow: hidden;
    }

    .brand-pill::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,184,0,0.08), transparent);
      transform: translateX(-100%);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      60%,100% { transform: translateX(100%); }
    }

  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="mesh"></div>
  <div class="grain"></div>
  <div class="frame"></div>

  <!-- Floating spice particles -->
  <div class="particles" id="particles"></div>

  <!-- Spice illustrations -->
  <div class="botanicals">

    <!-- Turmeric root — bottom left -->
    <svg class="spice-illo" style="--r:-12deg; bottom:5%; left:2%; width:110px; animation-delay:0s;" viewBox="0 0 100 120" fill="none">
      <path d="M20 60 Q35 55 55 58 Q70 60 78 52 Q85 42 75 32 Q62 22 45 28 Q28 34 20 60Z" fill="#FFB800" opacity="0.7"/>
      <path d="M25 55 Q40 50 58 53" stroke="#FF3A00" stroke-width="1" opacity="0.5" fill="none"/>
      <path d="M30 48 Q48 43 64 47" stroke="#FF3A00" stroke-width="0.8" opacity="0.4" fill="none"/>
      <path d="M55 58 Q65 70 60 82 Q54 90 48 85 Q42 78 50 68 Q52 63 55 58Z" fill="#FF7A1A" opacity="0.6"/>
      <path d="M35 57 Q28 72 32 85 Q36 94 43 90 Q50 84 44 72 Q40 64 35 57Z" fill="#FF7A1A" opacity="0.5"/>
      <circle cx="70" cy="34" r="5" fill="#FFB800" opacity="0.5"/>
    </svg>

    <!-- Chilli — top right -->
    <svg class="spice-illo" style="--r:18deg; top:7%; right:4%; width:55px; animation-delay:1s;" viewBox="0 0 50 130" fill="none">
      <path d="M25 15 C29 22 33 45 31 75 C29 95 22 110 25 120" stroke="#FF3A00" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M25 15 C21 22 17 45 19 75 C21 95 28 110 25 120" stroke="#FF7A1A" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M23 13 Q25 4 31 1 Q29 8 25 15" fill="#FFB800"/>
      <ellipse cx="25" cy="68" rx="7" ry="25" fill="#FF3A00" opacity="0.35"/>
    </svg>

    <!-- Cardamom — bottom right -->
    <svg class="spice-illo" style="--r:22deg; bottom:7%; right:4%; width:70px; animation-delay:2s;" viewBox="0 0 60 120" fill="none">
      <ellipse cx="30" cy="58" rx="16" ry="38" fill="#FFB800" opacity="0.4"/>
      <ellipse cx="30" cy="58" rx="16" ry="38" stroke="#FF7A1A" stroke-width="1.2" fill="none"/>
      <path d="M14 58 Q22 50 30 58 Q38 66 46 58" stroke="#FF3A00" stroke-width="1" fill="none" opacity="0.6"/>
      <path d="M14 58 Q22 66 30 58 Q38 50 46 58" stroke="#FF3A00" stroke-width="1" fill="none" opacity="0.6"/>
      <path d="M16 42 Q30 35 44 42" stroke="#FFB800" stroke-width="0.7" fill="none" opacity="0.5"/>
      <path d="M16 74 Q30 81 44 74" stroke="#FFB800" stroke-width="0.7" fill="none" opacity="0.5"/>
      <ellipse cx="24" cy="48" rx="4" ry="6" fill="#FF3A00" opacity="0.25"/>
      <ellipse cx="36" cy="58" rx="4" ry="6" fill="#FF3A00" opacity="0.25"/>
      <ellipse cx="24" cy="68" rx="4" ry="6" fill="#FF3A00" opacity="0.25"/>
      <path d="M30 20 Q32 13 30 9 Q28 13 30 20" fill="#FFB800" opacity="0.7"/>
    </svg>

    <!-- Cinnamon sticks — right middle -->
    <svg class="spice-illo" style="--r:8deg; top:42%; right:2%; width:60px; animation-delay:3s;" viewBox="0 0 60 110" fill="none">
      <rect x="16" y="10" width="11" height="90" rx="5.5" fill="#FF7A1A" opacity="0.5"/>
      <line x1="16" y1="28" x2="27" y2="28" stroke="#FF3A00" stroke-width="0.7" opacity="0.5"/>
      <line x1="16" y1="44" x2="27" y2="44" stroke="#FF3A00" stroke-width="0.7" opacity="0.5"/>
      <line x1="16" y1="60" x2="27" y2="60" stroke="#FF3A00" stroke-width="0.7" opacity="0.5"/>
      <line x1="16" y1="76" x2="27" y2="76" stroke="#FF3A00" stroke-width="0.7" opacity="0.5"/>
      <rect x="30" y="20" width="11" height="82" rx="5.5" fill="#FFB800" opacity="0.35"/>
      <line x1="30" y1="38" x2="41" y2="38" stroke="#FF7A1A" stroke-width="0.7" opacity="0.4"/>
      <line x1="30" y1="55" x2="41" y2="55" stroke="#FF7A1A" stroke-width="0.7" opacity="0.4"/>
      <line x1="30" y1="72" x2="41" y2="72" stroke="#FF7A1A" stroke-width="0.7" opacity="0.4"/>
    </svg>

    <!-- Pestle & Mortar — bottom left -->
    <svg class="spice-illo" style="--r:-6deg; bottom:5%; left:40%; width:95px; animation-delay:1.5s;" viewBox="0 0 100 95" fill="none">
      <path d="M15 50 Q15 82 50 85 Q85 82 85 50 Z" fill="#FF7A1A" opacity="0.4"/>
      <path d="M10 50 Q10 88 50 91 Q90 88 90 50" stroke="#FFB800" stroke-width="1.8" fill="none"/>
      <ellipse cx="50" cy="50" rx="40" ry="10" stroke="#FFB800" stroke-width="1.4" fill="none"/>
      <line x1="66" y1="16" x2="40" y2="54" stroke="#FF7A1A" stroke-width="3.5" stroke-linecap="round"/>
      <ellipse cx="38" cy="56" rx="7" ry="4.5" fill="#FFB800" opacity="0.8" transform="rotate(-30 38 56)"/>
      <circle cx="34" cy="66" r="2.5" fill="#FF3A00" opacity="0.7"/>
      <circle cx="50" cy="72" r="3" fill="#FFB800" opacity="0.6"/>
      <circle cx="63" cy="64" r="2" fill="#FF7A1A" opacity="0.7"/>
      <circle cx="44" cy="60" r="1.8" fill="#FF3A00" opacity="0.5"/>
    </svg>

    <!-- Coriander seeds — top left -->
    <svg class="spice-illo" style="--r:-8deg; top:6%; left:3%; width:75px; animation-delay:.5s;" viewBox="0 0 80 100" fill="none">
      <path d="M40 95 Q42 70 40 50 Q38 30 42 10" stroke="#FFB800" stroke-width="1.3" fill="none"/>
      <path d="M40 72 Q53 63 57 50 Q46 50 40 72" fill="#FF7A1A" opacity="0.55"/>
      <path d="M40 72 Q27 63 23 50 Q34 50 40 72" fill="#FF7A1A" opacity="0.55"/>
      <path d="M40 48 Q55 38 59 23 Q46 25 40 48" fill="#FFB800" opacity="0.45"/>
      <path d="M40 48 Q25 38 21 23 Q34 25 40 48" fill="#FFB800" opacity="0.45"/>
      <circle cx="40" cy="10" r="3.5" fill="#FF3A00" opacity="0.8"/>
      <circle cx="47" cy="7" r="3" fill="#FF3A00" opacity="0.7"/>
      <circle cx="33" cy="7" r="3" fill="#FFB800" opacity="0.7"/>
      <circle cx="42" cy="4" r="2.5" fill="#FF7A1A" opacity="0.6"/>
    </svg>

  </div>

  <!-- Main -->
  <div class="container">

    <span class="shree reveal r1">॥ श्री ॥</span>

    <div class="eyebrow reveal r2">Pure Spices</div>

    <div class="hero reveal r3">
      <span class="coming">Coming</span>
      <span class="soon">Soon</span>
    </div>

    <div class="divider reveal r4">
      <div class="d-line"></div>
      <span class="d-icon">🌶</span>
      <div class="d-line r"></div>
    </div>

    <div class="reveal r5">
      <div class="brand-pill">Rasgruh</div>
    </div>

  </div>

  <script>
    // Custom cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    // Particles
    const pc = document.getElementById('particles');
    const types = ['p-seed','p-flake','p-stick','p-dot'];
    for (let i = 0; i < 50; i++) {
      const p = document.createElement('div');
      p.classList.add('p', types[Math.floor(Math.random() * types.length)]);
      p.style.cssText = `left:${Math.random()*100}%; animation-duration:${Math.random()*14+9}s; animation-delay:${Math.random()*14}s;`;
      pc.appendChild(p);
    }
  </script>

</body>
</html>
